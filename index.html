<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KP's Prompt Cabinet</title>
  <meta
    name="description"
    content="An editorial, reading-first prompt cabinet by Kipeum Lee."
  >
  <link
    rel="icon"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%231a1613'/%3E%3Ctext x='50%25' y='56%25' text-anchor='middle' dominant-baseline='middle' font-family='-apple-system,BlinkMacSystemFont,sans-serif' font-weight='700' font-size='28' fill='%23f5f1ea'%3EKP%3C/text%3E%3C/svg%3E"
  >
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
  >
  <link rel="stylesheet" href="./styles.css">
</head>
<body data-mode="desktop" data-mobile-view="list">
  <a href="#reader" class="skip-link">Skip to reader</a>

  <div class="app">
    <aside class="rail" role="navigation" aria-label="Library">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true"><span>KP</span></div>
        <div class="brand-text">
          <div class="brand-name">Kipeum Lee</div>
          <div class="brand-role">Prompt Cabinet</div>
        </div>
      </div>

      <div class="rail-search">
        <input
          id="search-input"
          type="search"
          autocomplete="off"
          spellcheck="false"
          placeholder="search the cabinet…"
          aria-label="Search prompts"
        >
      </div>

      <nav class="rail-categories" id="rail-categories" aria-label="Categories"></nav>

      <div class="rail-spacer"></div>

      <div class="colophon">
        <div class="colophon-line">Volume 01</div>
        <div class="colophon-line colophon-line--muted" id="colophon-date"></div>
      </div>
    </aside>

    <header class="topbar" role="banner">
      <div class="topbar-brand">
        <div class="brand-mark brand-mark--sm" aria-hidden="true"><span>KP</span></div>
        <div class="brand-text">
          <div class="brand-name">Kipeum Lee</div>
          <div class="brand-role">Prompt Cabinet</div>
        </div>
      </div>
      <div class="topbar-actions">
        <input
          id="search-input-mobile"
          type="search"
          autocomplete="off"
          spellcheck="false"
          placeholder="search…"
          aria-label="Search prompts"
          class="topbar-search"
        >
        <button
          type="button"
          id="menu-chip"
          class="menu-chip"
          aria-haspopup="true"
          aria-expanded="false"
        >
          <span id="menu-chip-label">All</span>
          <span class="menu-chip-caret" aria-hidden="true">▾</span>
        </button>
      </div>
    </header>

    <div class="menu-sheet" id="menu-sheet" hidden>
      <div class="menu-sheet-backdrop" id="menu-sheet-backdrop"></div>
      <div class="menu-sheet-panel" role="dialog" aria-label="Categories">
        <nav class="rail-categories" id="menu-sheet-categories" aria-label="Categories"></nav>
      </div>
    </div>

    <section class="list-pane" aria-label="Entries">
      <header class="list-header">
        <h2 class="list-title" id="list-title">All</h2>
        <span class="list-count" id="list-count" aria-live="polite"></span>
      </header>
      <ol class="list-rows" id="list-rows" role="listbox" aria-label="Prompts"></ol>
    </section>

    <main class="reader" id="reader" role="main">
      <button type="button" class="reader-back" id="reader-back">← back to list</button>
      <article class="reader-article" id="reader-article" tabindex="-1"></article>
    </main>
  </div>

  <div class="sr-only" id="sr-announce" aria-live="polite" aria-atomic="true"></div>
  <div class="toast-root" id="toast-root" aria-live="polite" aria-atomic="true"></div>

  <script src="./app.js"></script>
</body>
</html>
